<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow, noarchive">
<title>Yes and... Scheduler — Design Doc</title>
<style>
  :root {
    --bg: #1a1614;
    --bg-elev: #221d1a;
    --border: #3a3128;
    --text: #e8dcc8;
    --text-dim: #a89c88;
    --accent: #e0a458;
    --accent-hot: #f4c373;
    --red: #d46a55;
    --serif: "Iowan Old Style", Palatino, Georgia, serif;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); }
  .gate { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
  .gate-inner { width: 100%; max-width: 420px; background: var(--bg-elev); border: 1px solid var(--border); border-radius: 10px; padding: 28px; }
  .gate h1 { font-family: var(--serif); color: var(--accent-hot); margin: 0 0 8px; font-size: 24px; }
  .gate p { color: var(--text-dim); margin: 0 0 18px; font-size: 14px; line-height: 1.5; }
  .gate label { font-family: var(--mono); font-size: 12px; color: var(--accent); display: block; margin-bottom: 6px; }
  .gate input { width: 100%; padding: 10px 12px; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 6px; font-family: var(--mono); font-size: 14px; }
  .gate input:focus { outline: none; border-color: var(--accent); }
  .gate button { margin-top: 14px; width: 100%; padding: 11px; background: var(--accent); color: #1a1614; border: none; border-radius: 6px; font-family: var(--sans); font-weight: 600; font-size: 14px; cursor: pointer; }
  .gate button:hover { background: var(--accent-hot); }
  .gate .err { color: var(--red); font-family: var(--mono); font-size: 12px; margin-top: 10px; min-height: 14px; }
  .gate .meta { margin-top: 18px; font-family: var(--mono); font-size: 11px; color: var(--text-dim); text-align: center; }
  .gate .meta a { color: var(--text-dim); }
</style>
</head>
<body>
<div class="gate">
  <div class="gate-inner">
    <h1>Yes and... Scheduler</h1>
    <p>Internal design document. Enter the password to view.</p>
    <form id="gateForm" autocomplete="off">
      <label for="pw">Password</label>
      <input id="pw" type="password" autofocus>
      <button type="submit">Enter</button>
      <div class="err" id="err">&nbsp;</div>
    </form>
    <div class="meta">
      vv0.1.0 &middot; <a href="../">back to projects</a>
    </div>
  </div>
</div>
