<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow, noarchive">
<meta name="googlebot" content="noindex, nofollow">
<title>Restricted Document &mdash; Here There Be Hordes</title>
<style>
  :root {
    --bg: #1a1614; --bg-elev: #221d1a; --border: #3a3128;
    --text: #e8dcc8; --text-dim: #a89c88; --text-faint: #6b6155;
    --accent: #e0a458; --accent-hot: #f4c373; --red: #d46a55;
    --serif: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg); color: var(--text);
    font-family: var(--sans);
  }
  body {
    display: flex; align-items: center; justify-content: center;
  }
  .gate {
    width: min(420px, 92vw);
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 32px 28px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.6);
  }
  h1 {
    font-family: var(--serif);
    font-size: 22px;
    margin: 0 0 6px;
    color: var(--accent-hot);
  }
  p {
    color: var(--text-dim);
    font-size: 14px;
    line-height: 1.5;
    margin: 0 0 18px;
  }
  label {
    display: block;
    color: var(--text-dim);
    font-size: 13px;
    margin-bottom: 6px;
  }
  input[type=password] {
    width: 100%;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px 12px;
    font-family: var(--mono);
    font-size: 14px;
    outline: none;
  }
  input[type=password]:focus {
    border-color: var(--accent);
  }
  button {
    margin-top: 14px;
    width: 100%;
    background: var(--accent);
    color: #1a1614;
    border: none;
    border-radius: 4px;
    padding: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  button:hover { background: var(--accent-hot); }
  .err {
    margin-top: 10px;
    color: var(--red);
    font-size: 12px;
    min-height: 16px;
  }
</style>
<!-- HTBH-GATE-PALETTE-V0.40.0 -->
<style>
  :root {
    --bg: #0e141b;
    --bg-elev: #16212d;
    --bg-elev-2: #1f2b39;
    --border: #2f4258;
    --border-strong: #486482;
    --text: #e9eff7;
    --text-dim: #a4b3c4;
    --text-faint: #6c7a8c;
    --brass: #d8b384;
    --brass-hot: #f2cd99;
    --patina: #69c0b4;
  }
  html, body {
    background: radial-gradient(ellipse 1200px 600px at 50% -200px, rgba(216,179,132,0.06) 0%, transparent 60%), var(--bg) !important;
    color: var(--text) !important;
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif !important;
  }
  h1, h2, h3 { color: var(--brass-hot) !important; font-family: "Cormorant Garamond", "Iowan Old Style", Georgia, serif !important; }
  a { color: var(--patina) !important; }
  input[type="password"], input[type="text"] {
    background: var(--bg-elev-2) !important;
    border: 1px solid var(--border-strong) !important;
    color: var(--text) !important;
    border-radius: 6px !important;
    padding: 10px 14px !important;
    font-size: 14px !important;
    outline: none !important;
  }
  input[type="password"]:focus, input[type="text"]:focus { border-color: var(--brass) !important; }
  button {
    background: var(--brass) !important;
    color: #0e141b !important;
    border: none !important;
    border-radius: 6px !important;
    padding: 10px 18px !important;
    font-family: inherit !important;
    font-weight: 600 !important;
    cursor: pointer !important;
    transition: background 0.15s !important;
  }
  button:hover { background: var(--brass-hot) !important; }
  .container, .gate, main, [role="main"] { background: var(--bg-elev) !important; border: 1px solid var(--border) !important; border-radius: 12px !important; }
</style>
</head>
<body>
<div class="gate">
  <h1>Restricted Document</h1>
  <p>This page is access-restricted. If you have the password, enter it below.</p>
  <label for="pw">Password</label>
  <input id="pw" type="password" autofocus autocomplete="off" />
  <button id="go">Unlock</button>
  <div class="err" id="err"></div>
</div>

<!-- HTBH-GATE-ACCESSMODE-V0.44.2 -->
<script>
(function () {
  try {
    // Default to viewer on load so a previous editor session doesn't
    // leak across users on shared machines.
    if (localStorage.getItem('htbh-access-mode') !== 'editor') {
      localStorage.setItem('htbh-access-mode', 'viewer');
    }
    var EDITOR = 'KanesChosen';
    function stampViewer() {
      try { localStorage.setItem('htbh-access-mode', 'viewer'); } catch (e) {}
    }
    function stampEditor() {
      try { localStorage.setItem('htbh-access-mode', 'editor'); } catch (e) {}
    }
    function tryEditorUnlock() {
      // Direct decode of the embedded base64 GDD payload. Sidesteps the
      // gate's regular password check so the editor password works even
      // if the gate's own allow-list doesn't include it.
      try {
        if (typeof ENCODED === 'undefined' || !ENCODED) return false;
        var html = atob(ENCODED);
        stampEditor();
        document.open();
        document.write(html);
        document.close();
        return true;
      } catch (e) {
        return false;
      }
    }
    function check(val, evOpt) {
      if (val === EDITOR) {
        if (evOpt) {
          try { evOpt.preventDefault(); } catch (e) {}
          try { evOpt.stopImmediatePropagation(); } catch (e) {}
        }
        tryEditorUnlock();
        return true;
      }
      stampViewer();
      return false;
    }
    function wire() {
      var inputs = document.querySelectorAll('input[type=\"password\"], input[type=\"text\"]');
      inputs.forEach(function (inp) {
        if (inp.dataset.htbhAccessWired === '1') return;
        inp.dataset.htbhAccessWired = '1';
        inp.addEventListener('keydown', function (e) {
          if (e.key === 'Enter') check(inp.value, e);
        }, true); // capture phase: run before the gate's handler
      });
      var btns = document.querySelectorAll('button, input[type=\"submit\"]');
      btns.forEach(function (b) {
        if (b.dataset.htbhAccessWired === '1') return;
        b.dataset.htbhAccessWired = '1';
        b.addEventListener('click', function (e) {
          var pw = document.querySelector('input[type=\"password\"], input[type=\"text\"]');
          if (pw) check(pw.value, e);
        }, true);
      });
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', wire);
    } else {
      wire();
    }
  } catch (e) { /* never block the gate */ }
})();
</script>
</body>
</html>
