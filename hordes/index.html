<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow, noarchive">
<meta name="googlebot" content="noindex, nofollow">
<title>Restricted Document &mdash; Here There Be Hordes</title>
<style>
  :root {
    --bg: #1a1614;
    --bg-elev: #221d1a;
    --bg-elev-2: #2b2521;
    --border: #3a3128;
    --text: #e8dcc8;
    --text-dim: #a89c88;
    --text-faint: #6b6155;
    --accent: #e0a458;
    --accent-dim: #b07c3a;
    --accent-hot: #f4c373;
    --red: #d46a55;
    --serif: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg); color: var(--text);
    font-family: var(--sans); font-size: 15px; line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  .gate-wrap {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 32px;
  }
  .gate-card {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 36px 40px;
    max-width: 460px;
    width: 100%;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
  }
  .gate-card h1 {
    font-family: var(--serif);
    color: var(--accent-hot);
    font-size: 24px;
    font-weight: 600;
    margin: 0 0 6px;
    letter-spacing: 0.5px;
  }
  .gate-card .subtitle {
    color: var(--text-dim);
    font-size: 13px;
    margin: 0 0 22px;
    font-family: var(--mono);
    letter-spacing: 0.05em;
  }
  .gate-card p {
    color: var(--text-dim);
    margin: 0 0 22px;
    font-size: 14px;
    line-height: 1.55;
  }
  .gate-form {
    display: flex; flex-direction: column; gap: 10px;
  }
  .gate-form input {
    padding: 12px 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 14px;
    transition: border-color 0.15s;
  }
  .gate-form input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .gate-form button {
    padding: 12px 14px;
    background: var(--accent);
    color: #1a1614;
    border: none;
    border-radius: 6px;
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .gate-form button:hover { background: var(--accent-hot); }
  .gate-error {
    color: var(--red);
    font-size: 13px;
    margin-top: 8px;
    min-height: 18px;
  }
  .gate-foot {
    margin-top: 18px;
    color: var(--text-faint);
    font-size: 12px;
    font-family: var(--mono);
  }
  /* GDD iframe takes over the entire viewport once unlocked */
  iframe.gdd-frame {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
    background: var(--bg);
  }
</style>
</head>
<body>
<div id="gate-root">

    <div class="gate-card">
      <h1>Here There Be Hordes</h1>
      <div class="subtitle">Game Design Document &middot; Private</div>

      <form class="gate-form" id="gate-form" autocomplete="off">
        <input type="password" id="gate-input" placeholder="Password" autocomplete="off" autofocus required>
        <button type="submit">Unlock</button>
        <div class="gate-error" id="gate-error">&nbsp;</div>
      </form>
      <div class="gate-foot">yesandeverything.com</div>
    </div>
  </div>
</div>

  function decodePayload() {
    var bytes = atob(ENCODED);
    var arr = new Uint8Array(bytes.length);
    for (var i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
    return new TextDecoder("utf-8").decode(arr);
  }

  function reveal() {
    sessionStorage.setItem(STORAGE_KEY, "true");
    var html;
    try {
      html = decodePayload();
    } catch (e) {
      document.body.innerHTML = "<p style='padding:32px;color:#d46a55;font-family:sans-serif;'>Failed to decode payload: " + e.message + "</p>";
      return;
    }
    // Hide the gate UI and inject an iframe with the GDD content via srcdoc.
    // srcdoc gives the iframe its own document context, so the GDD's scripts
    // (tab switching, etc.) run normally. Same-origin so localStorage is
    // shared with the parent if needed.
    var gateRoot = document.getElementById("gate-root");
    if (gateRoot) gateRoot.style.display = "none";
    var iframe = document.createElement("iframe");
    iframe.className = "gdd-frame";
    iframe.title = "Here There Be Hordes — Game Design Document";
    iframe.srcdoc = html;
    document.body.appendChild(iframe);
  }

  function showError(msg) {
    var err = document.getElementById("gate-error");
    if (err) err.textContent = msg;
  }

  function tryUnlock(value) {
    if (value === PASSWORD) {
      reveal();
    } else {
      showError("Incorrect password.");
      var input = document.getElementById("gate-input");
      if (input) { input.value = ""; input.focus(); }
    }
  }

  // Auto-unlock for this session if already authed
  if (sessionStorage.getItem(STORAGE_KEY) === "true") {
    // DOM may not be fully ready yet (script is in <head>... actually no,
    // it's at the end of body, so DOM is ready). Run immediately.
    reveal();
    return;
  }

  document.addEventListener("DOMContentLoaded", function() {
    var form = document.getElementById("gate-form");
    var input = document.getElementById("gate-input");
    if (form) {
      form.addEventListener("submit", function(e) {
        e.preventDefault();
        tryUnlock(input ? input.value : "");
      });
    }
  });

  // The script is at end-of-body, so DOMContentLoaded may have already fired.
  // Wire up the form directly as a fallback.
  var form = document.getElementById("gate-form");
  var input = document.getElementById("gate-input");
  if (form) {
    form.addEventListener("submit", function(e) {
      e.preventDefault();
      tryUnlock(input ? input.value : "");
    });
  }
})();
</script>
</body>
</html>
