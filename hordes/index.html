  .gate-error { color: var(--red); font-size: 13px; margin-top: 8px; min-height: 18px; }
  .gate-foot { margin-top: 18px; color: var(--text-faint); font-size: 12px; font-family: var(--mono); }
  iframe.gdd-frame { position: fixed; inset: 0; width: 100%; height: 100%; border: 0; background: var(--bg); }

    var gateRoot = document.getElementById("gate-root");
    if (gateRoot) gateRoot.style.display = "none";
    var iframe = document.createElement("iframe");
    iframe.className = "gdd-frame";
    iframe.title = "Here There Be Hordes - Game Design Document";
    iframe.srcdoc = html;
    document.body.appendChild(iframe);
  }

  function showError(msg) { var err = document.getElementById("gate-error"); if (err) err.textContent = msg; }

  function tryUnlock(value) {
    if (value === PASSWORD) reveal();
    else { showError("Incorrect password."); var input = document.getElementById("gate-input"); if (input) { input.value = ""; input.focus(); } }
  }

  if (sessionStorage.getItem(STORAGE_KEY) === "true") { reveal(); return; }

  var form = document.getElementById("gate-form");
  var input = document.getElementById("gate-input");
  if (form) {
    form.addEventListener("submit", function(e) {
      e.preventDefault();
      tryUnlock(input ? input.value : "");
    });
  }
})();
</script>
</body>
</html>
