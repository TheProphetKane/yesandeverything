<style>
  :root {

  body {

  .gate {

    font-size: 22px;
    margin: 0 0 6px;
    color: var(--accent-hot);
  }

    font-size: 14px;

    margin: 0 0 18px;
  }
  label {

    color: var(--text-dim);
    font-size: 13px;
    margin-bottom: 6px;
  }
  input[type=password] {
    width: 100%;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px 12px;
    font-family: var(--mono);
    font-size: 14px;
    outline: none;
  }
  input[type=password]:focus {
    border-color: var(--accent);
  }
  button {
    margin-top: 14px;
    width: 100%;
    background: var(--accent);
    color: #1a1614;
    border: none;
    border-radius: 4px;
    padding: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  button:hover { background: var(--accent-hot); }
  .err {
    margin-top: 10px;
    color: var(--red);
    font-size: 12px;
    min-height: 16px;
  }
</style>

  function tryUnlock() {
    var pw = document.getElementById('pw').value;
    if (pw !== PASSWORD) {
      document.getElementById('err').textContent = 'Incorrect password.';
      return;
    }
    try {
      var bytes = atob(ENCODED);
      // Decode UTF-8 bytes into string
      var arr = new Uint8Array(bytes.length);
      for (var i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
      var html = new TextDecoder('utf-8').decode(arr);
      document.open();
      document.write(html);
      document.close();
    } catch (e) {
      document.body.innerHTML = "<p style='padding:32px;color:#d46a55;font-family:sans-serif;'>Failed to decode payload: " + e.message + "</p>";
    }
  }

  document.getElementById('go').addEventListener('click', tryUnlock);
  document.getElementById('pw').addEventListener('keydown', function(ev) {
    if (ev.key === 'Enter') tryUnlock();
  });
</script>
