<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark" />
  <title>Celtic Apothecary Label Creator</title>
  <meta name="description" content="Design and print Celtic apothecary herb labels: parchment, gold trim, Elder Futhark runes, Celtic symbols, and botanical illustrations." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;700;900&family=IM+Fell+English:ital@1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/base.css" />
  <link rel="stylesheet" href="styles/editor.css" />
  <link rel="stylesheet" href="styles/label.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" defer></script>
  <style>
    .version-pill {
      font-family: ui-monospace, "JetBrains Mono", SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 11px;
      margin-left: 14px;
      opacity: 0.6;
      letter-spacing: 0.4px;
    }
  </style>
</head>
<body>
  <div class="app">

    <header class="app-header">
      <div data-shop-name>
        <span class="shop-name-display" data-shop-display>Lynn's Apothocary</span>
        <button class="shop-edit-btn" data-shop-edit aria-label="Edit shop name">edit</button>
        <button class="shop-color-btn" data-shop-color-btn type="button" aria-label="Change shop name color" title="Change title color"></button>
        <input class="shop-color-input" data-shop-color type="color" hidden />
        <input class="shop-name-input" data-shop-input type="text" hidden />
      </div>
    </header>

    <main class="app-main">
      <section class="editor-panel">
        <div class="editor-card" data-editor></div>
      </section>

      <section class="preview-panel">
        <div class="preview-card">
          <h2 class="preview-title">Label Preview</h2>
          <div class="label-wrapper" data-preview></div>
        </div>
        <aside class="saved-aside" data-saved-labels></aside>
      </section>
    </main>

    <footer class="app-footer">
      <a href="https://github.com/TheProphetKane/yesandapothecary" rel="noopener" target="_blank">source</a>
      <span class="version-pill">v0.8.0</span>
    </footer>
  </div>

  <div id="print-stage" data-print-stage></div>

  <script type="module">
    // v0.8.0 cache-bust: release.ps1 stamps a fresh BUILD value on every push.
    // Both the entry script and all its dynamic imports carry the build as a
    // ?v= query, so Cloudflare's edge cache can't ever serve a stale module
    // graph after a deploy — the URLs change with every release.
    window.__APOTHECARY_BUILD = "20260519173232";
    await import("./src/main.js?v=" + window.__APOTHECARY_BUILD);
  </script>
</body>
</html>
