<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark" />
  <title>Celtic Apothecary Label Creator</title>
  <meta name="description" content="Design and print Celtic apothecary herb labels: parchment, gold trim, Elder Futhark runes, Celtic symbols, and botanical illustrations." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;700;900&family=IM+Fell+English:ital@1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/base.css" />
  <link rel="stylesheet" href="styles/editor.css" />
  <link rel="stylesheet" href="styles/label.css" />
</head>
<body>
  <div class="app">

    <header class="app-header">
      <div data-shop-name>
        <span class="shop-name-display" data-shop-display>Lynn's Apothocary</span>
        <button class="shop-edit-btn" data-shop-edit aria-label="Edit shop name">edit</button>
        <input class="shop-name-input" data-shop-input type="text" hidden />
      </div>
    </header>

    <main class="app-main">
      <section class="editor-panel">
        <div class="editor-card" data-editor></div>
      </section>

      <section class="preview-panel">
        <div class="preview-card">
          <h2 class="preview-title">Label Preview</h2>
          <div class="label-wrapper" data-preview></div>
        </div>
      </section>
    </main>

    <footer class="app-footer">
      <a href="https://github.com/TheProphetKane/yesandapothecary" rel="noopener" target="_blank">source</a>
    </footer>
  </div>

  <!-- Print-stage: hidden on screen, rendered on print to avoid the
       single-tree position:fixed-overlap problem with two-page labels. -->
  <div id="print-stage" data-print-stage></div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
