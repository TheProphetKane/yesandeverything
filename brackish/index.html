<style>
  /* Marine + coral gate palette. Matches the GDD aesthetic.
     Deep ocean base, coral lantern-warm accents, patina copper. */
  :root {
    --bg: #07111c;
    --bg-elev: #0d1f30;
    --bg-elev-2: #163049;
    --border: #2a4866;
    --border-strong: #3d5e7e;
    --text: #e8f0e8;
    --text-dim: #a8c0c4;
    --text-faint: #6a8590;
    --coral: #d4795c;
    --coral-hot: #f0a584;
    --patina: #5a9a8a;
    --patina-bright: #7ab8a8;
    --red: #d46a55;
    --serif: "Cormorant Garamond", "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
    --sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    --mono: ui-monospace, "JetBrains Mono", "SF Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background:
      radial-gradient(ellipse 1200px 700px at 50% -200px, rgba(212,121,92,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 900px 500px at 20% 110%, rgba(90,154,138,0.04) 0%, transparent 60%),
      var(--bg);
    color: var(--text);
    font-family: var(--sans);
  }
  body {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
  }
  .gate {
    width: min(440px, 92vw);
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 32px 28px;
    box-shadow:
      0 1px 0 rgba(255,255,255,0.04) inset,
      0 24px 60px rgba(0,0,0,0.6),
      0 0 60px -20px rgba(212,121,92,0.15);
  }
  h1 {
    font-family: var(--serif);
    font-size: 24px;
    margin: 0 0 8px;
    color: var(--coral-hot);
    text-shadow: 0 0 20px rgba(240,165,132,0.18);
    font-weight: 600;
    letter-spacing: 0.01em;
  }
  .subtitle {
    font-family: var(--mono);
    color: var(--text-faint);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 18px;
  }
  p {
    color: var(--text-dim);
    font-size: 14px;
    line-height: 1.5;
    margin: 0 0 18px;
  }
  label {
    display: block;
    color: var(--text-dim);
    font-size: 12px;
    letter-spacing: 0.04em;
    margin-bottom: 6px;
    text-transform: uppercase;
    font-family: var(--mono);
  }
  input[type=password] {
    width: 100%;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border-strong);
    border-radius: 4px;
    padding: 11px 13px;
    font-family: var(--mono);
    font-size: 14px;
    outline: none;
    transition: border-color 160ms ease, box-shadow 160ms ease;
  }
  input[type=password]:focus {
    border-color: var(--coral);
    box-shadow: 0 0 0 1px rgba(212,121,92,0.3);
  }
  button {
    margin-top: 14px;
    width: 100%;
    background: var(--coral);
    color: var(--bg);
    border: none;
    border-radius: 4px;
    padding: 11px;
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: background 160ms ease;
  }
  button:hover { background: var(--coral-hot); }
  button:focus-visible {
    outline: 2px solid var(--patina-bright);
    outline-offset: 2px;
  }
  .err {
    margin-top: 10px;
    color: var(--red);
    font-size: 12px;
    min-height: 16px;
    font-family: var(--mono);
  }
  .ornament {
    color: var(--coral);
    text-align: center;
    margin-top: 18px;
    font-size: 14px;
    letter-spacing: 0.5em;
    opacity: 0.5;
  }
</style>
</head>

</div>

(function() {
  var VIEWER = 'SneakPeak';
  var EDITOR = 'KanesChosen';
  var form = document.getElementById('gate-form');
  var pwInp = document.getElementById('gate-pw');
  var errEl = document.getElementById('gate-err');

  function decodePayload() {
    // UTF-8 decode through TextDecoder so multi-byte chars survive base64.
    // Matches the v0.2.x fix applied to the hordes/ gate.
    if (typeof ENCODED === 'undefined' || !ENCODED || ENCODED.indexOf('PLACEHOLDER') === 0) {
      return null;
    }
    try {
      var bin = atob(ENCODED);
      var bytes = new Uint8Array(bin.length);
      for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      try {
        return new TextDecoder('utf-8').decode(bytes);
      } catch (te) {
        return bin;
      }
    } catch (e) {
      return null;
    }
  }

  function stampViewer() {
    try { localStorage.setItem('brackish-access-mode', 'viewer'); } catch (e) {}
  }

  function stampEditor() {
    try { localStorage.setItem('brackish-access-mode', 'editor'); } catch (e) {}
  }

  // Default to viewer on every load
  if (localStorage.getItem('brackish-access-mode') !== 'editor') {
    stampViewer();
  }

  form.addEventListener('submit', function(e) {
    e.preventDefault();
    var val = pwInp.value;
    if (val === VIEWER || val === EDITOR) {
      if (val === EDITOR) {
        stampEditor();
      } else {
        stampViewer();
      }
      var html = decodePayload();
      if (!html) {
        errEl.textContent = 'GDD payload not yet published.';
        return;
      }
      document.open();
      document.write(html);
      document.close();
    } else {
      errEl.textContent = 'Wrong phrase.';
      pwInp.value = '';
      pwInp.focus();
    }
  });
})();
</script>
